name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Validate tag matches package version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          test "$VERSION" = "$TAG"

      - name: Build release bundle
        run: bash scripts/build-release-bundle.sh

      - name: Build Debian package
        run: bash scripts/build-deb.sh

      - name: Render Homebrew formula
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: bash scripts/render-homebrew-formula.sh out/tallybridge.rb

      - name: Stash Homebrew formula for tap update
        run: cp out/tallybridge.rb "$RUNNER_TEMP/tallybridge.rb"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            out/*.tar.gz
            out/*.deb
            out/*.rb

      - name: Update tapped Homebrew formula on main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          mkdir -p Formula
          cp "$RUNNER_TEMP/tallybridge.rb" Formula/tallybridge.rb

          if git diff --quiet -- Formula/tallybridge.rb; then
            echo "Formula already up to date"
            exit 0
          fi

          git add Formula/tallybridge.rb
          git commit -m "Update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin main
